{% extends "base.html" %}

{% block content %}

<style>
/* Center content */
.success-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
}

.success-card {
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    padding: 50px 40px;
    max-width: 450px;
    text-align: center;
    color: #000; /* Dark text for white background */
}

.success-card h2 {
    color: #28a745; /* Green for success */
    margin-bottom: 20px;
}

.success-card p {
    font-size: 1.1rem;
    margin-bottom: 30px;
}

.btn-home {
    background-color: #764ba2;
    color: #fff;
    border-radius: 10px;
    padding: 10px 25px;
    font-weight: bold;
    text-decoration: none;
    transition: 0.3s;
}

.btn-home:hover {
    background-color: #5a379f;
    color: #fff;
}
</style>

<div class="success-container">
    <div class="success-card">
        <h2>✅ Payment Successful!</h2>
        <p>Your booking has been confirmed. Thank you for using Smart Rental.</p>
        <a href="{{ url_for('dashboard') }}" class="btn-home">Go to Dashboard</a>
    </div>
</div>

{% endblock %}
